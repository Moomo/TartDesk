name: Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on:
      - self-hosted
      - macOS

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_VERSION:-}" ]]; then
            VERSION="$INPUT_VERSION"
            TAG="v$VERSION"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "ZIP_NAME=TartDesk-$VERSION-macOS.zip" >> "$GITHUB_ENV"
          echo "ZIP_PATH=$GITHUB_WORKSPACE/dist/TartDesk-$VERSION-macOS.zip" >> "$GITHUB_ENV"
          echo "CHECKSUM_PATH=$GITHUB_WORKSPACE/dist/TartDesk-$VERSION-macOS.zip.sha256" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          CERT_BASE64_PATH="$RUNNER_TEMP/developer-id.p12.b64"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          printf '%s' "$APPLE_CERT_BASE64" > "$CERT_BASE64_PATH"
          base64 -D -i "$CERT_BASE64_PATH" -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
          [[ -n "$SIGNING_IDENTITY" ]] || { echo "Developer ID Application identity not found" >&2; exit 1; }

          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Build app bundle
        run: APP_VERSION="$VERSION" ./scripts/build-app.sh

      - name: Sign app bundle
        run: |
          set -euo pipefail
          codesign --force --deep --options runtime --timestamp --sign "$SIGNING_IDENTITY" "dist/TartDesk.app"
          codesign --verify --deep --strict --verbose=2 "dist/TartDesk.app"

      - name: Prepare App Store Connect API key
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Create signed archive for notarization
        run: |
          set -euo pipefail
          mkdir -p dist
          ditto -c -k --keepParent "dist/TartDesk.app" "$ZIP_PATH"

      - name: Notarize app archive
        run: |
          set -euo pipefail
          xcrun notarytool submit "$ZIP_PATH" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "${{ secrets.APPLE_API_KEY_ID }}" \
            --issuer "${{ secrets.APPLE_API_ISSUER_ID }}" \
            --wait

      - name: Staple notarization ticket
        run: |
          set -euo pipefail
          xcrun stapler staple "dist/TartDesk.app"
          xcrun stapler validate "dist/TartDesk.app"

      - name: Recreate release archive and checksum
        run: |
          set -euo pipefail
          rm -f "$ZIP_PATH" "$CHECKSUM_PATH"
          ditto -c -k --keepParent "dist/TartDesk.app" "$ZIP_PATH"
          shasum -a 256 "$ZIP_PATH" > "$CHECKSUM_PATH"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP_PATH" "$CHECKSUM_PATH" --clobber
          else
            gh release create "$TAG" "$ZIP_PATH" "$CHECKSUM_PATH" \
              --title "$TAG" \
              --generate-notes
          fi
